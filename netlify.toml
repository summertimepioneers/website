# ══════════════════════════════════════════════════════
# netlify.toml — конфиг деплоя для Netlify
#
# ВАЖНО: этот файл должен лежать в КОРНЕ вашего репозитория GitHub,
# рядом с index.html и dev.html
# ══════════════════════════════════════════════════════

[build]
  # Папка которую Netlify будет публиковать.
  # Так как у нас чистый HTML без сборщика — указываем "."
  # (текущая папка, там где лежит index.html)
  publish = "."

  # Команда сборки — у нас её нет, оставляем пустой
  command = ""

# Перенаправление всех 404 на index.html (на случай прямых ссылок)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
